<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Big Cat ABC Game</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap');
:root{--red:#E8412A;--red-d:#B82E1B;--blue:#4A7FD4;--blue-d:#2F5FAA;--yellow:#FFD23F;--yellow-d:#C9A200;--green:#52C46A;--green-d:#3A9A50;--bg:#FFF8EE;--text:#1E1E2E;--gray:#9BA3AF;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:"Nunito",sans-serif;background:var(--bg);}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle,#FFD23F1A 2px,transparent 2px);background-size:30px 30px;}
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s,transform .4s;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(20px);}
#title-screen{gap:10px;padding:20px;}
.title-logo{font-family:"Fredoka One",cursive;font-size:clamp(3rem,9vw,5.5rem);color:var(--red);text-shadow:4px 5px 0 #FFC1B9;line-height:1;text-align:center;}
.title-sub{font-family:"Fredoka One",cursive;font-size:clamp(.9rem,2.5vw,1.4rem);color:var(--blue);letter-spacing:4px;text-align:center;}
.title-chars{display:flex;gap:8px;align-items:flex-end;justify-content:center;flex-wrap:wrap;max-width:700px;margin:4px 0;}
.title-char{height:clamp(60px,14vw,110px);object-fit:contain;filter:drop-shadow(2px 6px 8px rgba(0,0,0,.15));animation:titleBob var(--d,2s) ease-in-out infinite;animation-delay:var(--delay,0s);}
@keyframes titleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.diff-section{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:500px;}
.diff-label{font-family:"Fredoka One",cursive;font-size:1.1rem;color:var(--text);letter-spacing:2px;}
.diff-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.diff-btn{font-family:"Fredoka One",cursive;font-size:1rem;padding:10px 22px;border-radius:30px;border:3px solid transparent;cursor:pointer;transition:all .2s;letter-spacing:1px;}
.diff-btn.easy{background:#D4EDDA;color:#1B6B2E;border-color:#52C46A;}
.diff-btn.medium{background:#FFF3CD;color:#856404;border-color:#FFD23F;}
.diff-btn.hard{background:#F8D7DA;color:#842029;border-color:#E8412A;}
.diff-btn.easy.active{background:#52C46A;color:white;transform:scale(1.1);box-shadow:0 4px 14px rgba(0,0,0,.2);}
.diff-btn.medium.active{background:#FFD23F;color:#333;transform:scale(1.1);box-shadow:0 4px 14px rgba(0,0,0,.2);}
.diff-btn.hard.active{background:#E8412A;color:white;transform:scale(1.1);box-shadow:0 4px 14px rgba(0,0,0,.2);}
.diff-desc{font-size:.85rem;font-weight:700;color:var(--gray);text-align:center;min-height:18px;}
.start-btn{font-family:"Fredoka One",cursive;font-size:1.6rem;background:var(--red);color:white;border:none;border-radius:50px;padding:14px 50px;cursor:pointer;box-shadow:0 6px 0 var(--red-d);transition:all .1s;letter-spacing:2px;}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 9px 0 var(--red-d);}
.start-btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--red-d);}
#grid-screen{padding:14px;gap:10px;}
.grid-top{text-align:center;}
.grid-title{font-family:"Fredoka One",cursive;font-size:clamp(1.4rem,3.5vw,2rem);color:var(--red);}
.grid-diff-badge{display:inline-block;font-family:"Fredoka One",cursive;font-size:.8rem;padding:3px 14px;border-radius:20px;margin-top:4px;letter-spacing:1px;}
.prog-row{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:4px;}
.prog-label{font-size:.85rem;font-weight:800;color:var(--blue);}
.prog-track{width:clamp(140px,35vw,300px);height:12px;background:#EDE8DF;border-radius:10px;overflow:hidden;border:2px solid #D5CEC4;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),#7EE48A);border-radius:10px;transition:width .6s ease;}
.alpha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px;width:min(95vw,720px);max-height:60vh;overflow-y:auto;padding:4px 2px;}
.alpha-grid::-webkit-scrollbar{width:4px;}
.alpha-grid::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px;}
.alpha-card{aspect-ratio:1;border-radius:16px;border:3px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-family:"Fredoka One",cursive;transition:all .2s;position:relative;user-select:none;overflow:hidden;}
.alpha-card img{width:80%;height:80%;object-fit:contain;}
.alpha-card .lbl{font-size:.7rem;line-height:1;letter-spacing:1px;}
.alpha-card .lock-icon{font-size:.9rem;opacity:.5;}
.alpha-card .star-badge{position:absolute;top:-4px;right:-4px;font-size:1rem;}
.alpha-card.locked{background:#EDE8DF;border-color:#D5CEC4;color:#B0B8C1;cursor:not-allowed;}
.alpha-card.avail{background:white;border-color:var(--blue);color:var(--blue);box-shadow:0 4px 0 var(--blue-d);}
.alpha-card.avail:hover{transform:translateY(-5px) scale(1.07);box-shadow:0 9px 0 var(--blue-d);}
.alpha-card.done{background:linear-gradient(135deg,var(--yellow),#FFE87A);border-color:var(--yellow-d);box-shadow:0 3px 0 var(--yellow-d);}
.alpha-card.done:hover{transform:translateY(-3px) scale(1.04);}
.pulse-ring{position:absolute;inset:-3px;border-radius:18px;border:3px solid var(--blue);animation:ringPulse 1.8s ease-in-out infinite;opacity:0;}
@keyframes ringPulse{0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(1.15)}}
#letter-screen{flex-direction:row;align-items:stretch;padding:0;}
.left-panel{flex:0 0 auto;width:clamp(180px,32vw,320px);background:#FFF3DC;border-right:4px solid #F0E4CB;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 12px;gap:8px;position:relative;overflow:hidden;}
.back-btn{position:absolute;top:10px;left:10px;font-family:"Fredoka One",cursive;font-size:.8rem;background:white;color:var(--red);border:2px solid var(--red);border-radius:20px;padding:4px 12px;cursor:pointer;transition:all .2s;z-index:2;}
.back-btn:hover{background:var(--red);color:white;}
.diff-chip{position:absolute;top:10px;right:10px;font-family:"Fredoka One",cursive;font-size:.65rem;padding:3px 10px;border-radius:20px;}
.letter-badge{font-family:"Fredoka One",cursive;font-size:clamp(3rem,8vw,5.5rem);color:var(--red);line-height:1;text-shadow:3px 4px 0 #FFC1B9;animation:letterPop .5s cubic-bezier(.175,.885,.32,1.275);}
@keyframes letterPop{0%{transform:scale(0) rotate(-20deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.char-img{width:clamp(120px,24vw,240px);object-fit:contain;animation:charIn .7s cubic-bezier(.175,.885,.32,1.275) .1s both;filter:drop-shadow(0 8px 24px rgba(0,0,0,.18));cursor:pointer;transition:transform .2s;}
.char-img:hover{transform:scale(1.05);}
@keyframes charIn{0%{transform:translateY(50px) scale(.6);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
.char-img.wiggle{animation:wiggle .5s ease-in-out;}
@keyframes wiggle{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(-10deg) scale(1.08)}75%{transform:rotate(10deg) scale(1.08)}}
.tap-hint{font-size:.75rem;font-weight:700;color:#B0946A;letter-spacing:1px;}
.right-panel{flex:1;display:flex;flex-direction:column;padding:clamp(14px,3vw,28px);gap:12px;overflow-y:auto;}
.challenge-title{font-family:"Fredoka One",cursive;font-size:clamp(1.1rem,2.5vw,1.6rem);color:var(--text);}
.challenge-sub{font-size:.85rem;font-weight:700;color:var(--gray);margin-bottom:4px;}
.mcq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mcq-btn{font-family:"Fredoka One",cursive;font-size:clamp(.9rem,2vw,1.2rem);background:white;border:3px solid #E0D9CF;border-radius:16px;padding:14px 10px;cursor:pointer;transition:all .2s;letter-spacing:1px;text-align:center;color:var(--text);box-shadow:0 3px 0 #D5CEC4;}
.mcq-btn:hover{transform:translateY(-3px);border-color:var(--blue);box-shadow:0 6px 0 var(--blue-d);color:var(--blue);}
.mcq-btn.correct{background:var(--green);border-color:var(--green-d);color:white;box-shadow:0 3px 0 var(--green-d);transform:scale(1.05);}
.mcq-btn.wrong{background:#FFE5E5;border-color:var(--red);color:var(--red);}
.slots-list{display:flex;flex-direction:column;gap:7px;}
.slot-row{display:flex;align-items:center;gap:8px;background:#F7F4EF;border:2.5px solid #E0D9CF;border-radius:12px;padding:9px 12px;transition:all .3s;min-height:48px;}
.slot-row.filled{background:#EEF8F0;border-color:var(--green);}
.slot-num{font-family:"Fredoka One",cursive;font-size:.95rem;color:var(--gray);min-width:20px;}
.slot-text{flex:1;font-size:1rem;font-weight:800;letter-spacing:1.5px;}
.slot-text.empty{color:#CCC4B8;font-weight:600;font-size:.85rem;}
.slot-text.word{color:var(--text);text-transform:uppercase;}
.slot-check{font-size:1.1rem;}
.hard-word-display{font-family:"Fredoka One",cursive;font-size:clamp(1.6rem,4vw,2.8rem);color:var(--text);letter-spacing:6px;text-align:center;padding:10px 0;}
.blank{color:var(--red);border-bottom:4px solid var(--red);min-width:30px;display:inline-block;text-align:center;}
.hard-hint-text{font-size:.9rem;font-weight:700;color:var(--blue);text-align:center;font-style:italic;}
.input-area{display:flex;flex-direction:column;gap:8px;}
.input-row{display:flex;gap:8px;}
.word-inp{flex:1;font-family:"Nunito",sans-serif;font-size:1.1rem;font-weight:800;background:white;border:2.5px solid #D5CEC4;border-radius:10px;padding:10px 14px;color:var(--text);outline:none;text-transform:uppercase;letter-spacing:2px;transition:all .2s;}
.word-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(74,127,212,.15);}
.word-inp::placeholder{color:#CCC4B8;text-transform:none;font-size:.85rem;letter-spacing:0;font-weight:600;}
.ok-btn{font-family:"Fredoka One",cursive;font-size:1rem;background:var(--blue);color:white;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;box-shadow:0 4px 0 var(--blue-d);transition:all .1s;}
.ok-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--blue-d);}
.ok-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--blue-d);}
.hint-btn{font-family:"Fredoka One",cursive;font-size:.85rem;background:white;color:var(--blue);border:2px solid var(--blue);border-radius:8px;padding:7px 16px;cursor:pointer;transition:all .2s;}
.hint-btn:hover{background:var(--blue);color:white;}
.error-msg{font-size:.85rem;font-weight:800;color:var(--red);min-height:18px;}
@keyframes wrongShake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
#complete-modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#complete-modal.show{opacity:1;pointer-events:all;}
.modal-box{background:white;border-radius:24px;padding:clamp(20px,4vw,36px);max-width:420px;width:90%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalPop .5s cubic-bezier(.175,.885,.32,1.275);}
@keyframes modalPop{0%{transform:scale(.4) rotate(-8deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.modal-title{font-family:"Fredoka One",cursive;font-size:clamp(1.6rem,4vw,2.4rem);color:var(--red);}
.modal-char{height:clamp(100px,22vw,180px);object-fit:contain;animation:modalCharBounce .8s cubic-bezier(.175,.885,.32,1.275) .2s both;}
@keyframes modalCharBounce{0%{transform:scale(0) translateY(40px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
.modal-next{font-family:"Fredoka One",cursive;font-size:1rem;color:var(--blue);}
.modal-next-ltr{font-family:"Fredoka One",cursive;font-size:1.8rem;color:var(--green);}
.modal-btn{font-family:"Fredoka One",cursive;font-size:1.2rem;background:var(--green);color:white;border:none;border-radius:50px;padding:12px 38px;cursor:pointer;box-shadow:0 5px 0 var(--green-d);transition:all .1s;letter-spacing:1px;}
.modal-btn:hover{transform:translateY(-2px);box-shadow:0 7px 0 var(--green-d);}
#toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-family:"Fredoka One",cursive;font-size:1rem;padding:9px 24px;border-radius:30px;z-index:999;pointer-events:none;opacity:0;transition:all .3s;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(8px);}
#toast.ok{background:var(--green);color:white;}
#toast.bad{background:var(--red);color:white;}
.confetti{position:fixed;border-radius:2px;pointer-events:none;z-index:200;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(105vh) rotate(600deg)}}
@media(max-width:580px){
  #letter-screen{flex-direction:column;}
  .left-panel{width:100%;border-right:none;border-bottom:4px solid #F0E4CB;padding:10px;flex-direction:row;gap:10px;min-height:auto;}
  .letter-badge{font-size:3rem;}
  .char-img{width:90px;}
  .tap-hint,.diff-chip{display:none;}
  .right-panel{padding:10px;gap:8px;}
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="complete-modal">
  <div class="modal-box">
    <div class="modal-title">&#127881; GREAT JOB!</div>
    <img class="modal-char" id="modalChar" src="" alt="">
    <div class="modal-next" id="modalNextText">Next letter unlocked!</div>
    <div class="modal-next-ltr" id="modalNextLtr"></div>
    <button class="modal-btn" onclick="closeModal()">Let's Go! &#8594;</button>
  </div>
</div>
<div class="screen" id="title-screen">
  <div class="title-logo">BIG CAT<br>ABC!</div>
  <div class="title-sub">&#9999;&#65039; ALPHABET ADVENTURE &#9999;&#65039;</div>
  <div class="title-chars" id="titleChars"></div>
  <div class="diff-section">
    <div class="diff-label">&#127918; Choose Difficulty</div>
    <div class="diff-row">
      <button class="diff-btn easy active" id="btnEasy">&#11088; EASY<br><small>Pick the word!</small></button>
      <button class="diff-btn medium" id="btnMedium">&#11088;&#11088; MEDIUM<br><small>Type 5 words!</small></button>
      <button class="diff-btn hard" id="btnHard">&#11088;&#11088;&#11088; HARD<br><small>Fill in blanks!</small></button>
    </div>
    <div class="diff-desc" id="diffDesc">Choose a word that starts with the letter! 4 choices.</div>
  </div>
  <button class="start-btn" onclick="startGame()">&#9654; START</button>
</div>
<div class="screen hidden" id="grid-screen">
  <div class="grid-top">
    <div class="grid-title">&#128288; Choose a Letter!</div>
    <div class="grid-diff-badge" id="gridDiffBadge"></div>
    <div class="prog-row">
      <div class="prog-label" id="progLabel">0 / 26</div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
  </div>
  <div class="alpha-grid" id="alphaGrid"></div>
</div>
<div class="screen hidden" id="letter-screen">
  <div class="left-panel">
    <button class="back-btn" onclick="goGrid()">&#8592; Back</button>
    <div class="diff-chip" id="challengeChip"></div>
    <div class="letter-badge" id="letterBadge">A</div>
    <img class="char-img" id="charImg" src="" alt="" onclick="wiggleChar()">
    <div class="tap-hint">&#128070; Tap to animate!</div>
  </div>
  <div class="right-panel" id="rightPanel"></div>
</div>

  easy:  {bg:'#D4EDDA', color:'#1B6B2E', border:'#52C46A'},
  medium:{bg:'#FFF3CD', color:'#856404', border:'#FFD23F'},
  hard:  {bg:'#F8D7DA', color:'#842029', border:'#E8412A'}
};
var DIFF_DESC = {
  easy:   'Choose the correct word from 4 choices!',
  medium: 'Type 5 words that start with this letter!',
  hard:   'Fill in the missing letters! 5 rounds.'
};

// ===== INIT TITLE =====
function initTitle() {
  var tc = document.getElementById('titleChars');
  tc.innerHTML = '';
  ['A','C','G','I','T','N','S'].forEach(function(l, i) {
    if (!IMGS[l]) return;
    var img = document.createElement('img');
    img.src = 'data:image/jpeg;base64,' + IMGS[l];
    img.className = 'title-char';
    img.style.setProperty('--d', (2 + i * 0.25) + 's');
    img.style.setProperty('--delay', (i * 0.12) + 's');
    tc.appendChild(img);
  });
  document.getElementById('btnEasy').addEventListener('click', function() { setDiff('easy'); });
  document.getElementById('btnMedium').addEventListener('click', function() { setDiff('medium'); });
  document.getElementById('btnHard').addEventListener('click', function() { setDiff('hard'); });
}

function setDiff(d) {
  DIFF = d;
  document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
  var id = d === 'easy' ? 'btnEasy' : d === 'medium' ? 'btnMedium' : 'btnHard';
  document.getElementById(id).classList.add('active');
  document.getElementById('diffDesc').textContent = DIFF_DESC[d];
}

function startGame() {
  updateGridBadge();
  goGrid();
}

function updateGridBadge() {
  var badge = document.getElementById('gridDiffBadge');
  var c = DIFF_COLORS[DIFF];
  var label = DIFF === 'easy' ? '\u2B50 EASY' : DIFF === 'medium' ? '\u2B50\u2B50 MEDIUM' : '\u2B50\u2B50\u2B50 HARD';
  badge.textContent = label;
  badge.style.cssText = 'background:' + c.bg + ';color:' + c.color + ';border:2px solid ' + c.border + ';border-radius:20px;padding:2px 14px;font-size:.8rem;letter-spacing:1px;';
}

function goGrid() {
  buildGrid();
  showScreen('grid-screen');
}

// ===== GRID =====
function buildGrid() {
  var grid = document.getElementById('alphaGrid');
  grid.innerHTML = '';
  var letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  var done = letters.filter(function(l) { return state.completed[l] && state.completed[l][DIFF]; }).length;
  document.getElementById('progLabel').textContent = done + ' / 26';
  document.getElementById('progFill').style.width = (done / 26 * 100) + '%';
  updateGridBadge();

  letters.forEach(function(ltr) {
    var card = document.createElement('div');
    card.className = 'alpha-card';
    var isDone = state.completed[ltr] && state.completed[ltr][DIFF];
    var isUnlocked = state.unlocked[ltr];

    if (isDone) {
      card.classList.add('done');
      if (IMGS[ltr]) {
        var img = document.createElement('img');
        img.src = 'data:image/jpeg;base64,' + IMGS[ltr];
        card.appendChild(img);
      }
      var lbl = document.createElement('div'); lbl.className = 'lbl'; lbl.textContent = ltr; card.appendChild(lbl);
      var star = document.createElement('div'); star.className = 'star-badge'; star.textContent = '\u2B50'; card.appendChild(star);
      card.addEventListener('click', (function(l) { return function() { openLetter(l); }; })(ltr));
    } else if (isUnlocked) {
      card.classList.add('avail');
      if (IMGS[ltr]) {
        var ring = document.createElement('div'); ring.className = 'pulse-ring'; card.appendChild(ring);
        var img2 = document.createElement('img');
        img2.src = 'data:image/jpeg;base64,' + IMGS[ltr];
        card.appendChild(img2);
      }
      var lbl2 = document.createElement('div'); lbl2.className = 'lbl'; lbl2.textContent = ltr; card.appendChild(lbl2);
      card.addEventListener('click', (function(l) { return function() { openLetter(l); }; })(ltr));
    } else {
      card.classList.add('locked');
      var li = document.createElement('div'); li.className = 'lock-icon'; li.textContent = '\uD83D\uDD12'; card.appendChild(li);
      var lbl3 = document.createElement('div'); lbl3.className = 'lbl'; lbl3.style.color = '#B0B8C1'; lbl3.textContent = ltr; card.appendChild(lbl3);
    }
    grid.appendChild(card);
  });
}

// ===== OPEN LETTER =====
function openLetter(ltr) {
  curLetter = ltr;
  easyRound = 0; hardRound = 0; hardAnswered = 0;

  document.getElementById('letterBadge').textContent = ltr;
  var img = document.getElementById('charImg');
  if (IMGS[ltr]) {
    img.src = 'data:image/jpeg;base64,' + IMGS[ltr];
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }

  var chip = document.getElementById('challengeChip');
  var c = DIFF_COLORS[DIFF];
  chip.textContent = DIFF === 'easy' ? '\u2B50 EASY' : DIFF === 'medium' ? '\u2B50\u2B50 MED' : '\u2B50\u2B50\u2B50 HARD';
  chip.style.cssText = 'background:' + c.bg + ';color:' + c.color + ';border:2px solid ' + c.border + ';border-radius:20px;font-size:.65rem;padding:2px 8px;';

  buildRightPanel();
  showScreen('letter-screen');

  if ('speechSynthesis' in window) {
    setTimeout(function() {
      speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(ltr + '!');
      u.rate = 0.8; u.pitch = 1.2;
      speechSynthesis.speak(u);
    }, 400);
  }
}

function wiggleChar() {
  var img = document.getElementById('charImg');
  img.classList.remove('wiggle');
  void img.offsetWidth;
  img.classList.add('wiggle');
  setTimeout(function() { img.classList.remove('wiggle'); }, 600);
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(curLetter + '!');
    u.rate = 0.8; u.pitch = 1.3;
    speechSynthesis.speak(u);
  }
}

// ===== BUILD RIGHT PANEL =====
function buildRightPanel() {
  var rp = document.getElementById('rightPanel');
  rp.innerHTML = '';
  if (DIFF === 'easy') buildEasy(rp);
  else if (DIFF === 'medium') buildMedium(rp);
  else buildHard(rp);
}

// ===== EASY MODE =====
function getDistractors(letter, correct) {
  var allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').filter(function(l) { return l !== letter; });
  var out = [];
  var attempts = 0;
  while (out.length < 3 && attempts < 60) {
    attempts++;
    var rl = allLetters[Math.floor(Math.random() * allLetters.length)];
    var pool = WORDS[rl] || [];
    if (!pool.length) continue;
    var w = pool[Math.floor(Math.random() * pool.length)];
    if (out.indexOf(w) === -1 && w !== correct) out.push(w);
  }
  return out;
}

function buildEasy(rp) {
  var header = document.createElement('div');
  header.innerHTML = '<div class="challenge-title">Which word starts with <em style="color:var(--red);font-style:normal;font-size:1.2em;">' + curLetter + '</em>?</div>' +
    '<div class="challenge-sub">Question <span id="easyQ">1</span> of ' + NEED + '</div>';
  rp.appendChild(header);

  var progWrap = document.createElement('div');
  progWrap.style.cssText = 'height:6px;background:#EDE8DF;border-radius:10px;overflow:hidden;';
  progWrap.innerHTML = '<div id="easyBar" style="height:100%;width:0%;background:var(--green);border-radius:10px;transition:width .4s;"></div>';
  rp.appendChild(progWrap);

  var mcq = document.createElement('div');
  mcq.className = 'mcq-grid';
  mcq.id = 'mcqArea';
  rp.appendChild(mcq);

  var err = document.createElement('div');
  err.className = 'error-msg'; err.id = 'errorMsg';
  rp.appendChild(err);

  loadEasyQ();
}

function loadEasyQ() {
  if (easyRound >= NEED) { completeLevel(); return; }
  var qEl = document.getElementById('easyQ');
  if (qEl) qEl.textContent = easyRound + 1;
  var bar = document.getElementById('easyBar');
  if (bar) bar.style.width = (easyRound / NEED * 100) + '%';

  var pool = WORDS[curLetter] || [];
  var correct = pool[Math.floor(Math.random() * pool.length)];
  var choices = [correct].concat(getDistractors(curLetter, correct));
  choices.sort(function() { return Math.random() - 0.5; });

  var mcq = document.getElementById('mcqArea');
  if (!mcq) return;
  mcq.innerHTML = '';
  choices.forEach(function(w) {
    var btn = document.createElement('button');
    btn.className = 'mcq-btn';
    btn.textContent = w;
    (function(word, corr) {
      btn.addEventListener('click', function() { checkEasy(btn, word, corr); });
    })(w, correct);
    mcq.appendChild(btn);
  });
}

function checkEasy(btn, chosen, correct) {
  document.querySelectorAll('.mcq-btn').forEach(function(b) { b.disabled = true; });
  if (chosen === correct) {
    btn.classList.add('correct');
    showToast('\u2728 Correct! ' + correct, 'ok');
    easyRound++;
    setTimeout(loadEasyQ, 900);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.mcq-btn').forEach(function(b) {
      if (b.textContent === correct) b.classList.add('correct');
    });
    showToast('\u274C It was: ' + correct, 'bad');
    easyRound++;
    setTimeout(loadEasyQ, 1300);
  }
}

// ===== MEDIUM MODE =====
function buildMedium(rp) {
  var words = state.words[curLetter] || [];
  var header = document.createElement('div');
  header.innerHTML = '<div class="challenge-title">Type words starting with <em style="color:var(--red);font-style:normal;font-size:1.2em;">' + curLetter + '</em></div>' +
    '<div class="challenge-sub"><span id="doneCount">' + words.length + '</span>/' + NEED + ' words done</div>';
  rp.appendChild(header);

  var slotsList = document.createElement('div');
  slotsList.className = 'slots-list'; slotsList.id = 'slotsList';
  rp.appendChild(slotsList);

  var inputArea = document.createElement('div');
  inputArea.className = 'input-area';
  inputArea.innerHTML = '<div class="input-row">' +
    '<input class="word-inp" id="wordInp" type="text" placeholder="Type a word starting with ' + curLetter + '..." maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false">' +
    '<button class="ok-btn" id="okBtn">OK</button>' +
    '</div>' +
    '<div style="display:flex;gap:8px;align-items:center;">' +
    '<button class="hint-btn" id="hintBtn">\uD83D\uDCA1 Hint</button>' +
    '<div class="error-msg" id="errorMsg"></div>' +
    '</div>';
  rp.appendChild(inputArea);

  document.getElementById('okBtn').addEventListener('click', submitMedium);
  document.getElementById('hintBtn').addEventListener('click', function() {
    showToast('\uD83D\uDCA1 ' + (HINTS[curLetter] || 'No hints available!'), 'ok');
  });
  document.getElementById('wordInp').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitMedium(); }
  });

  renderSlots();
  setTimeout(function() { var inp = document.getElementById('wordInp'); if (inp) inp.focus(); }, 150);
}

function renderSlots() {
  var words = state.words[curLetter] || [];
  var list = document.getElementById('slotsList');
  if (!list) return;
  list.innerHTML = '';
  for (var i = 0; i < NEED; i++) {
    var row = document.createElement('div');
    row.className = 'slot-row' + (words[i] ? ' filled' : '');
    row.id = 'slot' + i;
    row.innerHTML = '<div class="slot-num">' + (i + 1) + '.</div>' +
      '<div class="slot-text ' + (words[i] ? 'word' : 'empty') + '">' + (words[i] || '\u2014 \u2014 \u2014 \u2014') + '</div>' +
      (words[i] ? '<div class="slot-check">\u2705</div>' : '');
    list.appendChild(row);
  }
  var dc = document.getElementById('doneCount');
  if (dc) dc.textContent = words.length;
}

function submitMedium() {
  var inp = document.getElementById('wordInp');
  if (!inp) return;
  var raw = inp.value.trim().toUpperCase();
  inp.value = '';
  setError('');
  if (!raw) return;
  if (raw.length < 2) { setError('Too short! Try again.'); return; }
  if (raw[0] !== curLetter) { setError('Must start with ' + curLetter + '!'); shakeSlot((state.words[curLetter] || []).length); return; }
  var words = state.words[curLetter] || [];
  if (words.indexOf(raw) !== -1) { setError('Already used! Try another.'); return; }
  if ((WORDS[curLetter] || []).indexOf(raw) === -1) { setError('Not in word list! Try another.'); shakeSlot(words.length); return; }
  if (!state.words[curLetter]) state.words[curLetter] = [];
  state.words[curLetter].push(raw);
  saveState();
  wiggleChar();
  renderSlots();
  showToast('\u2728 ' + raw + '!', 'ok');
  if (state.words[curLetter].length >= NEED) { setTimeout(completeLevel, 800); return; }
  setTimeout(function() { var i = document.getElementById('wordInp'); if (i) i.focus(); }, 50);
}

function shakeSlot(idx) {
  if (idx >= NEED) idx = NEED - 1;
  var s = document.getElementById('slot' + idx);
  if (!s) return;
  s.style.animation = 'wrongShake .4s ease';
  setTimeout(function() { s.style.animation = ''; }, 500);
}

// ===== HARD MODE =====
function buildHard(rp) {
  hardAnswered = 0; hardRound = 0;
  var header = document.createElement('div');
  header.innerHTML = '<div class="challenge-title">Fill the blanks! Letter <em style="color:var(--red);font-style:normal;font-size:1.2em;">' + curLetter + '</em></div>' +
    '<div class="challenge-sub">Round <span id="hardQ">1</span> of ' + NEED + ' &nbsp;\u2705 <span id="hardCorrect">0</span> correct</div>';
  rp.appendChild(header);

  var progWrap = document.createElement('div');
  progWrap.style.cssText = 'height:6px;background:#EDE8DF;border-radius:10px;overflow:hidden;margin-bottom:6px;';
  progWrap.innerHTML = '<div id="hardBar" style="height:100%;width:0%;background:var(--red);border-radius:10px;transition:width .4s;"></div>';
  rp.appendChild(progWrap);

  var qa = document.createElement('div');
  qa.id = 'hardQArea';
  rp.appendChild(qa);

  var inputArea = document.createElement('div');
  inputArea.className = 'input-area';
  inputArea.innerHTML = '<div class="input-row">' +
    '<input class="word-inp" id="hardInp" type="text" placeholder="Type the complete word..." maxlength="20" autocomplete="off" autocorrect="off" spellcheck="false">' +
    '<button class="ok-btn" id="hardOkBtn">OK</button>' +
    '</div>' +
    '<div style="display:flex;gap:8px;align-items:center;">' +
    '<button class="hint-btn" id="hardHintBtn">\uD83D\uDCA1 Hint</button>' +
    '<div class="error-msg" id="errorMsg"></div>' +
    '</div>';
  rp.appendChild(inputArea);

  document.getElementById('hardOkBtn').addEventListener('click', submitHard);
  document.getElementById('hardHintBtn').addEventListener('click', function() {
    showToast('\uD83D\uDCA1 The word has ' + curHardWord.length + ' letters!', 'ok');
  });
  document.getElementById('hardInp').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); submitHard(); }
  });

  loadHardQ();
  setTimeout(function() { var inp = document.getElementById('hardInp'); if (inp) inp.focus(); }, 150);
}

function loadHardQ() {
  if (hardRound >= NEED) { completeLevel(); return; }
  var qEl = document.getElementById('hardQ');
  if (qEl) qEl.textContent = hardRound + 1;
  var bar = document.getElementById('hardBar');
  if (bar) bar.style.width = (hardRound / NEED * 100) + '%';

  var pool = FILL_WORDS[curLetter] || [];
  var item = pool[hardRound % pool.length];
  curHardWord = item[0];

  var qa = document.getElementById('hardQArea');
  if (!qa) return;
  qa.innerHTML = '<div class="hard-word-display">' + formatBlanked(item[2]) + '</div>' +
    '<div class="hard-hint-text">\uD83D\uDCAC ' + item[1] + '</div>';

  var inp = document.getElementById('hardInp');
  if (inp) { inp.value = ''; inp.focus(); }
}

function formatBlanked(pattern) {
  return pattern.split('').map(function(c) {
    if (c === '_') return '<span class="blank">&nbsp;&nbsp;</span>';
    return '<span style="color:var(--text);font-weight:900;">' + c + '</span>';
  }).join('<span style="display:inline-block;width:4px;"></span>');
}

function submitHard() {
  var inp = document.getElementById('hardInp');
  if (!inp) return;
  var ans = inp.value.trim().toUpperCase();
  inp.value = '';
  setError('');
  if (!ans) return;
  if (ans === curHardWord) {
    hardAnswered++;
    hardRound++;
    wiggleChar();
    showToast('\uD83C\uDF89 Correct! ' + curHardWord, 'ok');
    var hc = document.getElementById('hardCorrect');
    if (hc) hc.textContent = hardAnswered;
    setTimeout(loadHardQ, 800);
  } else {
    setError('Not right! Try again. (' + ans.length + ' vs ' + curHardWord.length + ' letters)');
    var qa = document.getElementById('hardQArea');
    if (qa) {
      qa.style.animation = 'wrongShake .4s ease';
      setTimeout(function() { qa.style.animation = ''; }, 500);
    }
    inp.focus();
  }
}

// ===== COMPLETE LEVEL =====
function completeLevel() {
  if (!state.completed[curLetter]) state.completed[curLetter] = {};
  state.completed[curLetter][DIFF] = true;
  var nextCode = curLetter.charCodeAt(0) + 1;
  var nextLtr = nextCode <= 90 ? String.fromCharCode(nextCode) : null;
  if (nextLtr && !state.unlocked[nextLtr]) state.unlocked[nextLtr] = true;
  saveState();

  var mc = document.getElementById('modalChar');
  if (IMGS[curLetter]) {
    mc.src = 'data:image/jpeg;base64,' + IMGS[curLetter];
    mc.style.display = 'block';
  } else {
    mc.style.display = 'none';
  }
  document.getElementById('modalNextText').textContent = nextLtr ? '\uD83D\uDD13 Next letter unlocked!' : '\uD83C\uDFC6 Amazing job!';
  document.getElementById('modalNextLtr').textContent = nextLtr ? '"' + nextLtr + '" is now ready!' : 'You finished all 26 letters!';
  document.getElementById('complete-modal').classList.add('show');
  launchConfetti();
}

function closeModal() {
  document.getElementById('complete-modal').classList.remove('show');
  goGrid();
}

// ===== UTILS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.add('hidden'); });
  document.getElementById(id).classList.remove('hidden');
}

function setError(m) {
  var e = document.getElementById('errorMsg');
  if (!e) return;
  e.textContent = m;
  if (m) {
    setTimeout(function() { if (e.textContent === m) e.textContent = ''; }, 2500);
  }
}

var toastTimer;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function launchConfetti() {
  var cols = ['#E8412A','#4A7FD4','#FFD23F','#52C46A','#FF6B9D','#A78BFA'];
  for (var i = 0; i < 70; i++) {
    (function(delay) {
      setTimeout(function() {
        var p = document.createElement('div');
        p.className = 'confetti';
        var col = cols[Math.floor(Math.random() * cols.length)];
        var size = 8 + Math.random() * 8;
        p.style.cssText = 'left:' + (Math.random() * 100) + 'vw;background:' + col +
          ';animation-duration:' + (1.5 + Math.random() * 2) + 's' +
          ';animation-delay:' + (Math.random() * 0.3) + 's' +
          ';border-radius:' + (Math.random() > 0.5 ? '50%' : '3px') +
          ';width:' + size + 'px;height:' + size + 'px';
        document.body.appendChild(p);
        setTimeout(function() { p.remove(); }, 3500);
      }, delay);
    })(i * 22);
  }
}

initTitle();

</script>
</body>
</html>
