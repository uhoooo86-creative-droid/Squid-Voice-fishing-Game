<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚦 Red Light Green Light</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">

<script type="module">
import { PoseLandmarker, FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";
window.MP = { PoseLandmarker, FaceLandmarker, FilesetResolver };
window.MP_LOADED = false;
async function initMP() {
  try {
    const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
    window.poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task", delegate: "GPU" },
      runningMode: "VIDEO", numPoses: 1
    });
    window.faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
      runningMode: "VIDEO", outputFaceBlendshapes: true, numFaces: 1
    });
    window.MP_LOADED = true;
    const s = document.getElementById('mp-status');
    if(s){ s.textContent = '✅ AI Ready'; s.style.color = '#06d6a0'; }
  } catch(e) {
    const s = document.getElementById('mp-status');
    if(s){ s.textContent = '⚠️ AI 오프라인 (음성만 동작)'; }
    console.warn(e);
  }
}
initMP();
</script>

<style>
:root {
  --red:    #e63946;
  --green:  #06d6a0;
  --yellow: #ffd166;
  --amber:  #f4a261;
  --bg:     #0c0c0e;
  --surface:#141416;
  --border: #222228;
  --text:   #f0f0f0;
  --muted:  #55555f;
  --font-d: 'Bebas Neue', sans-serif;
  --font-b: 'Noto Sans KR', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden}

.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* ═══ HOME ═══ */
#home{
  align-items:center;justify-content:center;gap:0;
  background: radial-gradient(ellipse at 50% 20%, #1c1018 0%, #0c0c0e 65%);
  position:relative;overflow:hidden;padding:32px 20px;
}

/* 신호등 SVG 장식 */
.deco-lights{
  display:flex;gap:16px;margin-bottom:28px;
  position:relative;z-index:1;
}
.deco-light{
  width:52px;height:52px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.08);
  box-shadow:inset 0 0 12px rgba(0,0,0,0.5);
  position:relative;
}
.deco-light.r{ background:radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b); box-shadow:0 0 24px rgba(230,57,70,0.6), inset 0 2px 4px rgba(255,255,255,0.2); animation:glow-r 2s ease-in-out infinite alternate; }
.deco-light.a{ background:radial-gradient(circle at 35% 35%, #ffd166, #e67e22); box-shadow:0 0 20px rgba(255,209,102,0.3), inset 0 2px 4px rgba(255,255,255,0.2); opacity:0.4; }
.deco-light.g{ background:radial-gradient(circle at 35% 35%, #51f0b0, #06d6a0); box-shadow:0 0 24px rgba(6,214,160,0.5), inset 0 2px 4px rgba(255,255,255,0.2); animation:glow-g 2s ease-in-out infinite alternate 1s; }
@keyframes glow-r{ from{box-shadow:0 0 16px rgba(230,57,70,0.4)} to{box-shadow:0 0 36px rgba(230,57,70,0.9)} }
@keyframes glow-g{ from{box-shadow:0 0 16px rgba(6,214,160,0.3)} to{box-shadow:0 0 36px rgba(6,214,160,0.8)} }

.logo-wrap{
  position:relative;z-index:1;margin-bottom:20px;
  animation:float 4s ease-in-out infinite;
}
.logo-wrap img{
  width:96px;height:96px;border-radius:22px;
  box-shadow:0 8px 32px rgba(0,0,0,0.6), 0 0 0 2px rgba(255,255,255,0.06);
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.home-eyebrow{
  font-size:11px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;
  margin-bottom:6px;position:relative;z-index:1;
}
.home-title{
  font-family:var(--font-d);
  font-size:clamp(36px,10vw,64px);
  letter-spacing:3px;text-align:center;
  line-height:1;margin-bottom:4px;
  position:relative;z-index:1;
}
.home-title .t-red{color:var(--red);text-shadow:0 0 30px rgba(230,57,70,0.5)}
.home-title .t-green{color:var(--green);text-shadow:0 0 30px rgba(6,214,160,0.5)}
.home-sub{
  font-size:12px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;
  margin-bottom:36px;position:relative;z-index:1;
}

.sentence-box{
  width:100%;max-width:380px;background:var(--surface);
  border:1px solid var(--border);border-radius:18px;padding:18px;
  margin-bottom:14px;position:relative;z-index:1;
}
.box-label{font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.sentence-box select, .sentence-box input{
  width:100%;background:#1a1a1e;border:1px solid #2a2a30;
  border-radius:10px;color:var(--text);font-family:var(--font-b);
  font-size:15px;padding:10px 14px;outline:none;cursor:pointer;
}
.sentence-box input{margin-top:8px;cursor:text}
.sentence-box input:focus{border-color:var(--green)}

#mp-status{font-size:11px;color:var(--muted);margin-bottom:16px;position:relative;z-index:1}

.btn-start{
  width:100%;max-width:380px;padding:18px;border:none;border-radius:16px;
  background:linear-gradient(135deg, var(--green), #00b894);
  color:#000;font-family:var(--font-d);font-size:24px;letter-spacing:3px;
  cursor:pointer;position:relative;z-index:1;transition:all 0.2s;
  box-shadow:0 8px 28px rgba(6,214,160,0.35);
}
.btn-start:active{transform:scale(0.97)}

/* ═══ GAME ═══ */
#game{padding:0;gap:0}

.game-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 16px 10px;background:var(--bg);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.gh-left{display:flex;align-items:center;gap:10px}
.gh-logo{width:32px;height:32px;border-radius:8px;object-fit:cover}
.gh-title{font-family:var(--font-d);font-size:20px;letter-spacing:2px}
.gh-title .r{color:var(--red)}.gh-title .g{color:var(--green)}

.yellow-cards{display:flex;gap:5px;align-items:center}
.card-pip{
  width:12px;height:16px;border-radius:3px;background:var(--border);
  transition:all 0.3s;
}
.card-pip.on{background:var(--yellow);box-shadow:0 0 8px rgba(255,209,102,0.7)}

.sentence-panel{
  padding:10px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.sp-label{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.sp-text{font-size:17px;font-weight:700;margin-top:2px}

/* 카메라 */
.cam-wrap{position:relative;flex:1;background:#000;overflow:hidden;min-height:220px}
#video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block}
#ov-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;transform:scaleX(-1)}

/* 신호등 오버레이 */
.light-ov{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.light-ov.show{opacity:1}
.light-ov-icon{font-size:64px;animation:pop 0.3s cubic-bezier(0.175,0.885,0.32,1.275)}
.light-ov-text{
  font-family:var(--font-d);font-size:clamp(28px,8vw,48px);
  letter-spacing:5px;text-shadow:0 2px 16px rgba(0,0,0,0.8);
}
@keyframes pop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.ov-green{background:rgba(6,214,160,0.15)}.ov-green .light-ov-text{color:var(--green)}
.ov-red{background:rgba(230,57,70,0.2)}.ov-red .light-ov-text{color:var(--red)}

/* 배지 */
.badge-row{position:absolute;bottom:10px;left:10px;display:flex;flex-wrap:wrap;gap:6px}
.badge{
  padding:4px 10px;border-radius:20px;border:1px solid;
  font-size:11px;font-weight:700;background:rgba(0,0,0,0.65);
  transition:all 0.2s;letter-spacing:1px;
}
.b-off{border-color:#2a2a2a;color:#383838}
.b-red{border-color:var(--red);color:var(--red);box-shadow:0 0 8px rgba(230,57,70,0.4)}
.b-green{border-color:var(--green);color:var(--green);box-shadow:0 0 8px rgba(6,214,160,0.4)}
.b-yellow{border-color:var(--yellow);color:var(--yellow)}

/* 컨트롤 */
.ctrl{
  padding:12px 16px;background:var(--bg);
  border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:9px;
}
.btn-row{display:flex;gap:9px}
.btn{
  flex:1;padding:14px 8px;border:none;border-radius:14px;
  font-family:var(--font-d);font-size:16px;letter-spacing:1px;
  cursor:pointer;transition:all 0.15s;
}
.btn:active{transform:scale(0.96)}
.btn-g{background:var(--green);color:#000}
.btn-r{background:var(--red);color:#fff}
.btn-dim{background:#1a1a1e;color:var(--muted);border:1px solid var(--border)}
.btn:disabled{opacity:0.3;pointer-events:none}

/* 로그 */
.log-box{
  background:#080808;border-top:1px solid var(--border);
  padding:8px 16px;height:66px;overflow-y:auto;flex-shrink:0;
}
.log-line{font-size:11px;color:#333;font-family:monospace;line-height:1.7}
.log-line.hi{color:#666}

/* ═══ RESULT ═══ */
#result{
  align-items:center;justify-content:center;
  padding:28px 20px;gap:18px;
  background:radial-gradient(ellipse at 50% 0%, #1a1020 0%, var(--bg) 60%);
}

/* 신호등 결과 아이콘 */
.result-light{
  display:flex;gap:14px;margin-bottom:4px;
}
.rl-dot{
  width:42px;height:42px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.06);
  transition:all 0.5s;
}
.rl-dot.active-r{background:radial-gradient(circle at 35% 35%,#ff6b6b,#c0392b);box-shadow:0 0 28px rgba(230,57,70,0.8)}
.rl-dot.active-g{background:radial-gradient(circle at 35% 35%,#51f0b0,#06d6a0);box-shadow:0 0 28px rgba(6,214,160,0.8)}
.rl-dot.active-y{background:radial-gradient(circle at 35% 35%,#ffd166,#e67e22);box-shadow:0 0 28px rgba(255,209,102,0.8)}
.rl-dot.dim{background:#1a1a1e}

.result-dec{
  font-family:var(--font-d);font-size:clamp(52px,14vw,80px);
  letter-spacing:5px;text-align:center;
  animation:dec-in 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes dec-in{from{transform:scale(0.4) rotate(-8deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.dec-pass{color:var(--green);text-shadow:0 0 40px rgba(6,214,160,0.5)}
.dec-yellow{color:var(--yellow);text-shadow:0 0 40px rgba(255,209,102,0.5)}
.dec-out{color:var(--red);text-shadow:0 0 40px rgba(230,57,70,0.5)}

.result-card{
  width:100%;max-width:380px;background:var(--surface);
  border-radius:18px;padding:18px;border:1px solid var(--border);
}
.rr{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--border);font-size:14px;
}
.rr:last-child{border-bottom:none}
.rr .lbl{color:var(--muted)}
.ok{color:var(--green);font-weight:700}
.fail{color:var(--red);font-weight:700}

.t-box{
  width:100%;max-width:380px;background:#0e0e10;
  border-radius:12px;padding:14px 16px;border:1px solid var(--border);text-align:center;
}
.t-lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.t-val{font-size:16px;font-weight:700}
.t-sc{font-size:12px;color:var(--green);margin-top:3px}

.btn-next{
  width:100%;max-width:380px;padding:17px;border:none;border-radius:16px;
  font-family:var(--font-d);font-size:22px;letter-spacing:2px;cursor:pointer;transition:all 0.15s;
}
.btn-next:active{transform:scale(0.97)}
</style>

</head>

const S = {
  sentence:'Who are you?',
  yellowCards:0, phase:'idle',
  visionOn:false, lastPose:null, prevPose:null, lastFace:null,
  snap:{moving:false,tri:false,face:false},
  recognition:null, transcript:'', speechOk:false, accuracy:0,
  stream:null, rafId:null, lastVT:-1
};

// ── 화면 ──
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goHome(){
  stopVision();stopSpeech();
  if(S.stream){S.stream.getTracks().forEach(t=>t.stop());S.stream=null;}
  S.phase='idle';S.yellowCards=0;updCards();show('home');
}

// ── 문장 선택 ──
function onSentSel(){
  const v=document.getElementById('sentence-select').value;
  const inp=document.getElementById('custom-inp');
  if(v==='custom'){inp.style.display='block';inp.focus();}
  else{inp.style.display='none';S.sentence=v;}
}

// ── 게임 시작 ──
async function startGame(){
  const v=document.getElementById('sentence-select').value;
  if(v==='custom'){const i=document.getElementById('custom-inp').value.trim();if(!i){alert('문장 입력!');return;}S.sentence=i;}
  else S.sentence=v;
  show('game');
  document.getElementById('cur-sent').textContent=S.sentence;
  updCards();
  await startCam();
  log('📷 카메라 준비. GREEN LIGHT 버튼을 눌러!');
}

// ── 카메라 ──
async function startCam(){
  try{
    const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});
    S.stream=st;
    const v=document.getElementById('video');v.srcObject=st;
    await new Promise(r=>v.onloadedmetadata=r);v.play();resizeCv();
  }catch(e){log('❌ 카메라 오류: '+e.message);}
}
function resizeCv(){const w=document.querySelector('.cam-wrap'),c=document.getElementById('ov-canvas');c.width=w.offsetWidth;c.height=w.offsetHeight;}
window.addEventListener('resize',resizeCv);

// ── GREEN ──
function onGreen(){
  S.phase='green';S.visionOn=true;S.prevPose=null;S.transcript='';S.speechOk=false;
  showLov('green');
  document.getElementById('btn-green').disabled=true;
  document.getElementById('btn-red').disabled=false;
  startVisionLoop();startSpeech();
  log('🟢 GREEN LIGHT — 말하고 포즈!');
}

// ── RED ──
async function onRed(){
  if(S.phase!=='green')return;
  S.phase='red';
  showLov('red');log('🔴 RED LIGHT — FREEZE!');
  const moving=checkMoving();
  const tri=S.lastPose?checkTri(S.lastPose):false;
  const funny=S.lastFace?checkFace(S.lastFace):false;
  S.snap={moving,tri,funny};
  stopVision();
  await waitSpeech(2000);
  judge();
}

// ── VISION LOOP ──
function startVisionLoop(){
  const vid=document.getElementById('video');
  const cv=document.getElementById('ov-canvas');
  const ctx=cv.getContext('2d');
  function loop(){
    if(!S.visionOn)return;
    S.rafId=requestAnimationFrame(loop);
    if(vid.readyState<2||vid.currentTime===S.lastVT)return;
    S.lastVT=vid.currentTime;
    ctx.clearRect(0,0,cv.width,cv.height);
    const now=performance.now();
    if(!window.MP_LOADED)return;
    try{
      const pr=window.poseLandmarker.detectForVideo(vid,now);
      if(pr.landmarks&&pr.landmarks[0]){
        S.prevPose=S.lastPose;
        S.lastPose=exPose(pr.landmarks[0]);
        drawPose(ctx,pr.landmarks[0],cv.width,cv.height);
      }
      const fr=window.faceLandmarker.detectForVideo(vid,now);
      if(fr.faceBlendshapes&&fr.faceBlendshapes[0])S.lastFace=exFace(fr.faceBlendshapes[0]);
    }catch(e){}
    if(S.phase==='green')updBadges();
  }
  loop();
}
function stopVision(){S.visionOn=false;if(S.rafId)cancelAnimationFrame(S.rafId);}

// ── POSE 추출 ──
function exPose(lm){
  return{nose:{x:lm[0].x,y:lm[0].y},ls:{x:lm[11].x,y:lm[11].y},rs:{x:lm[12].x,y:lm[12].y},le:{x:lm[13].x,y:lm[13].y},re:{x:lm[14].x,y:lm[14].y},lw:{x:lm[15].x,y:lm[15].y},rw:{x:lm[16].x,y:lm[16].y}};
}

function drawPose(ctx,lm,w,h){
  // 연결선
  const bones=[[11,13],[13,15],[12,14],[14,16],[11,12]];
  ctx.save();
  ctx.strokeStyle='rgba(6,214,160,0.5)';ctx.lineWidth=2;
  bones.forEach(([a,b])=>{
    if(!lm[a]||!lm[b]||lm[a].visibility<0.4||lm[b].visibility<0.4)return;
    ctx.beginPath();ctx.moveTo((1-lm[a].x)*w,lm[a].y*h);ctx.lineTo((1-lm[b].x)*w,lm[b].y*h);ctx.stroke();
  });
  // 점
  [0,11,12,13,14,15,16].forEach(i=>{
    if(!lm[i]||lm[i].visibility<0.4)return;
    ctx.beginPath();ctx.arc((1-lm[i].x)*w,lm[i].y*h,5,0,Math.PI*2);
    ctx.fillStyle='rgba(6,214,160,0.85)';ctx.fill();
  });
  // 삼각형 하이라이트
  if(S.lastPose&&checkTri(S.lastPose)){
    const lw=lm[15],rw=lm[16],nose=lm[0];
    ctx.beginPath();ctx.moveTo((1-lw.x)*w,lw.y*h);ctx.lineTo((1-rw.x)*w,rw.y*h);ctx.lineTo((1-nose.x)*w,nose.y*h);ctx.closePath();
    ctx.strokeStyle='rgba(255,209,102,0.7)';ctx.lineWidth=3;ctx.stroke();
  }
  ctx.restore();
}

// ── FACE 추출 ──
function exFace(bs){
  const g=(n)=>{const c=bs.categories.find(x=>x.categoryName===n);return c?c.score:0;};
  const jawOpen=g('jawOpen');
  const expr=Math.min(1,(g('browDownLeft')+g('browDownRight'))*0.3+(g('eyeSquintLeft')+g('eyeSquintRight'))*0.2+(g('mouthFrownLeft')+g('mouthFrownRight'))*0.2+(g('cheekPuff')||0)*0.3);
  return{mouthOpen:jawOpen,expr,funny:jawOpen>0.35||expr>0.5};
}

// ── 판정 ──
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function checkMoving(){
  if(!S.prevPose||!S.lastPose)return false;
  const p=S.prevPose,c=S.lastPose;
  return(dist(p.nose,c.nose)+dist(p.ls,c.ls)+dist(p.rs,c.rs)+dist(p.lw,c.lw)+dist(p.rw,c.rw))/5>0.025;
}
function checkTri(pose){
  const{lw,rw,nose,ls,rs}=pose;
  const sw=Math.abs(rs.x-ls.x),cx=(ls.x+rs.x)/2;
  return lw.y<nose.y-0.05&&rw.y<nose.y-0.05&&Math.abs(lw.x-rw.x)<sw*1.5&&Math.abs((lw.x+rw.x)/2-cx)<sw&&Math.abs(lw.y-rw.y)<0.1&&Math.min(lw.y,rw.y)<Math.min(ls.y,rs.y);
}
function checkFace(f){return f.funny;}

// ── 배지 ──
function updBadges(){
  const mov=S.lastPose&&S.prevPose?checkMoving():false;
  const tri=S.lastPose?checkTri(S.lastPose):false;
  const funny=S.lastFace?checkFace(S.lastFace):false;
  sb('b-move',mov,mov?'b-red':'b-off');
  sb('b-tri',tri,tri?'b-green':'b-off');
  sb('b-face',funny,funny?'b-green':'b-off');
  sb('b-rec',S.phase==='green','b-yellow');
}
function sb(id,on,cls){const e=document.getElementById(id);e.className='badge '+(on?cls:'b-off');}

// ── SPEECH ──
function startSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){log('⚠️ Chrome 필요 (음성인식)');return;}
  const r=new SR();r.lang='en-US';r.continuous=true;r.interimResults=true;r.maxAlternatives=3;
  r.onresult=(e)=>{
    let fin='';
    for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)fin+=e.results[i][0].transcript+' ';
    if(fin.trim()){S.transcript=fin.trim();S.accuracy=calcAcc(S.sentence,S.transcript);S.speechOk=S.accuracy>=65;log('🎤 "'+S.transcript+'" ('+S.accuracy+'%)');}
  };
  r.onerror=(e)=>{if(e.error!=='aborted')log('⚠️ '+e.error);};
  try{r.start();S.recognition=r;}catch(e){}
}
function stopSpeech(){if(S.recognition){try{S.recognition.stop();}catch(e){}S.recognition=null;}}
function waitSpeech(ms){return new Promise(r=>{stopSpeech();setTimeout(r,ms);});}

function calcAcc(t,s){
  if(!s)return 0;
  const tw=t.toLowerCase().replace(/[^a-z ]/g,'').split(' ').filter(Boolean);
  const sw=s.toLowerCase().replace(/[^a-z ]/g,'').split(' ').filter(Boolean);
  let m=0;const sc=[...sw];
  for(const w of tw){const i=sc.findIndex(x=>lev(w,x)<=Math.floor(w.length*0.35));if(i!==-1){m++;sc.splice(i,1);}}
  return Math.round(m/tw.length*100);
}
function lev(a,b){
  const dp=Array.from({length:a.length+1},(_,i)=>Array.from({length:b.length+1},(_,j)=>i===0?j:j===0?i:0));
  for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[a.length][b.length];
}

// ── 최종 판정 ──
function judge(){
  S.phase='judging';
  document.getElementById('btn-red').disabled=true;
  document.getElementById('btn-green').disabled=true;
  const{moving,tri,funny}=S.snap;
  const poseOk=tri||funny;
  const passed=!moving&&poseOk&&S.speechOk;
  let dec;
  if(passed){dec='PASS';}
  else{const n=S.yellowCards+1;dec=n>=2?'OUT':'YELLOW';if(dec==='YELLOW')S.yellowCards++;else S.yellowCards=2;}
  updCards();
  log(dec==='PASS'?'✅ PASS!':dec==='YELLOW'?'🟡 YELLOW CARD':'💀 OUT!');
  setTimeout(()=>showResult(dec,moving,tri,funny),700);
}

// ── 결과 ──
function showResult(dec,moving,tri,funny){
  show('result');
  // 신호등 색
  const dots=[document.getElementById('rl0'),document.getElementById('rl1'),document.getElementById('rl2')];
  dots.forEach(d=>d.className='rl-dot dim');
  if(dec==='PASS'){dots[2].className='rl-dot active-g';}
  else if(dec==='YELLOW'){dots[1].className='rl-dot active-y';}
  else{dots[0].className='rl-dot active-r';}

  const rd=document.getElementById('res-dec');
  rd.textContent=dec==='PASS'?'PASS':dec==='YELLOW'?'YELLOW':'OUT';
  rd.className='result-dec '+(dec==='PASS'?'dec-pass':dec==='YELLOW'?'dec-yellow':'dec-out');

  rr('rr-move',!moving);rr('rr-tri',tri);rr('rr-face',funny);rr('rr-voice',S.speechOk);
  document.getElementById('t-val').textContent=S.transcript||(S.speechOk?'OK':'(없음)');
  document.getElementById('t-sc').textContent=S.accuracy?'정확도 '+S.accuracy+'%':'';

  const bn=document.getElementById('btn-next');
  if(dec==='OUT'){bn.textContent='🔄 처음부터';bn.style.background='var(--red)';bn.style.color='#fff';}
  else if(dec==='PASS'){bn.textContent='다음 라운드 →';bn.style.background='var(--green)';bn.style.color='#000';}
  else{bn.textContent='다시 도전 →';bn.style.background='var(--yellow)';bn.style.color='#000';}
}
function rr(id,ok){const e=document.getElementById(id);e.textContent=ok?'✓ OK':'✗ FAIL';e.className=ok?'ok':'fail';}

function nextRound(){
  const t=document.getElementById('res-dec').textContent;
  if(t==='OUT'){S.yellowCards=0;updCards();goHome();return;}
  show('game');S.phase='idle';S.lastPose=null;S.prevPose=null;S.lastFace=null;S.transcript='';S.speechOk=false;
  document.getElementById('btn-green').disabled=false;
  document.getElementById('btn-red').disabled=true;
  showLov(null);
  ['b-move','b-tri','b-face','b-rec'].forEach(id=>document.getElementById(id).className='badge b-off');
  log('➡️ 다음 라운드!');
}

// ── UI 헬퍼 ──
function showLov(t){
  document.getElementById('lov-green').classList.remove('show');
  document.getElementById('lov-red').classList.remove('show');
  if(t==='green')document.getElementById('lov-green').classList.add('show');
  if(t==='red')document.getElementById('lov-red').classList.add('show');
  if(t)setTimeout(()=>showLov(null),1600);
}
function updCards(){
  [0,1].forEach(i=>{document.getElementById('cp'+i).classList.toggle('on',i<S.yellowCards);});
  document.getElementById('cp-lbl').textContent=S.yellowCards+'/2';
}
function log(msg){
  const p=document.getElementById('log-box');
  const d=document.createElement('div');d.className='log-line hi';d.textContent=msg;
  p.insertBefore(d,p.firstChild);
  [...p.children].slice(1).forEach(e=>e.className='log-line');
}
