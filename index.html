<html lang="ko">
<head>
<meta charset="UTF-8">

<title>🦑 SQUID GAME English</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<!-- MediaPipe Tasks Vision -->

<script type="module">
import {
  PoseLandmarker,
  FaceLandmarker,
  FilesetResolver,
  DrawingUtils
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

window.MP = { PoseLandmarker, FaceLandmarker, FilesetResolver, DrawingUtils };
window.MP_LOADED = false;

async function initMP() {
  try {
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );
    window.poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numPoses: 1
    });
    window.faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      outputFaceBlendshapes: true,
      numFaces: 1
    });
    window.MP_LOADED = true;
    document.getElementById('mp-status').textContent = '✅ AI 준비 완료';
    document.getElementById('mp-status').style.color = '#2ec4b6';
  } catch(e) {
    document.getElementById('mp-status').textContent = '⚠️ AI 로딩 실패 (카메라만 동작)';
    console.warn('MediaPipe load failed:', e);
  }
}
initMP();
</script>

<style>
:root {
  --red: #e63946;
  --green: #06d6a0;
  --yellow: #ffd166;
  --bg: #080808;
  --surface: #111111;
  --border: #1e1e1e;
  --text: #f0f0f0;
  --muted: #555;
  --font-display: 'Black Han Sans', sans-serif;
  --font-body: 'Noto Sans KR', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 화면 전환 ── */
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }

/* ══════════════════════════════
   HOME SCREEN
══════════════════════════════ */
#home {
  align-items: center;
  justify-content: center;
  gap: 0;
  background: radial-gradient(ellipse at 50% 30%, #1a0a0a 0%, #080808 70%);
  position: relative;
  overflow: hidden;
}
#home::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  border: 1px solid rgba(230,57,70,0.08);
  top: 50%; left: 50%;
  transform: translate(-50%, -60%);
  animation: pulse-ring 3s ease-in-out infinite;
}
#home::after {
  content: '';
  position: absolute;
  width: 700px; height: 700px;
  border-radius: 50%;
  border: 1px solid rgba(230,57,70,0.04);
  top: 50%; left: 50%;
  transform: translate(-50%, -60%);
  animation: pulse-ring 3s ease-in-out infinite 0.5s;
}
@keyframes pulse-ring {
  0%,100% { opacity: 0.5; transform: translate(-50%,-60%) scale(1); }
  50% { opacity: 1; transform: translate(-50%,-60%) scale(1.05); }
}

.home-emblem {
  font-size: 80px;
  margin-bottom: 8px;
  animation: float 4s ease-in-out infinite;
  position: relative; z-index: 1;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.home-title {
  font-family: var(--font-display);
  font-size: clamp(32px, 8vw, 52px);
  color: var(--red);
  letter-spacing: 4px;
  text-shadow: 0 0 40px rgba(230,57,70,0.5);
  position: relative; z-index: 1;
  margin-bottom: 4px;
}
.home-sub {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 48px;
  position: relative; z-index: 1;
}

.sentence-selector {
  width: 90%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  position: relative; z-index: 1;
}
.selector-label {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.sentence-selector select {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  padding: 10px 14px;
  cursor: pointer;
  outline: none;
}
.custom-input {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  padding: 10px 14px;
  margin-top: 8px;
  outline: none;
}
.custom-input:focus { border-color: var(--red); }

#mp-status {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 20px;
  position: relative; z-index: 1;
}

.btn-start {
  width: 90%; max-width: 380px;
  padding: 20px;
  background: var(--red);
  border: none;
  border-radius: 16px;
  color: #fff;
  font-family: var(--font-display);
  font-size: 22px;
  letter-spacing: 3px;
  cursor: pointer;
  position: relative; z-index: 1;
  transition: all 0.2s;
  box-shadow: 0 8px 32px rgba(230,57,70,0.3);
}
.btn-start:active { transform: scale(0.97); }

/* ══════════════════════════════
   GAME SCREEN
══════════════════════════════ */
#game {
  padding: 0;
  gap: 0;
}

.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 16px 8px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.game-title {
  font-family: var(--font-display);
  font-size: 18px;
  color: var(--red);
  letter-spacing: 2px;
}
.yellow-cards {
  display: flex;
  gap: 6px;
  align-items: center;
}
.card-dot {
  width: 14px; height: 18px;
  border-radius: 3px;
  background: var(--border);
  transition: all 0.3s;
}
.card-dot.active { background: var(--yellow); box-shadow: 0 0 8px rgba(255,209,102,0.6); }

.sentence-panel {
  background: var(--surface);
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sentence-panel .label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
.sentence-panel .sentence { font-size: 18px; font-weight: 700; color: var(--text); margin-top: 2px; }

/* 카메라 영역 */
.camera-wrap {
  position: relative;
  flex: 1;
  background: #000;
  overflow: hidden;
  min-height: 240px;
}
#video {
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1); /* 미러 */
  display: block;
}
#overlay-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  transform: scaleX(-1);
}

/* 신호등 오버레이 */
.light-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
.light-overlay.show { opacity: 1; }
.light-text {
  font-family: var(--font-display);
  font-size: clamp(40px, 12vw, 72px);
  letter-spacing: 6px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.8);
  animation: light-pop 0.3s ease-out;
}
@keyframes light-pop {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.light-green { background: rgba(6,214,160,0.15); }
.light-green .light-text { color: var(--green); }
.light-red { background: rgba(230,57,70,0.2); }
.light-red .light-text { color: var(--red); }

/* 배지 오버레이 */
.badge-row {
  position: absolute; bottom: 10px; left: 10px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.badge {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid;
  font-size: 11px; font-weight: 700;
  background: rgba(0,0,0,0.6);
  transition: all 0.2s;
  letter-spacing: 1px;
}
.badge.off { border-color: #333; color: #444; }
.badge.on-red { border-color: var(--red); color: var(--red); box-shadow: 0 0 8px rgba(230,57,70,0.4); }
.badge.on-green { border-color: var(--green); color: var(--green); box-shadow: 0 0 8px rgba(6,214,160,0.4); }
.badge.on-yellow { border-color: var(--yellow); color: var(--yellow); }

/* 컨트롤 패널 */
.control-panel {
  padding: 12px 16px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex-shrink: 0;
}

.btn-row { display: flex; gap: 10px; }

.btn {
  flex: 1; padding: 14px 8px;
  border: none; border-radius: 14px;
  font-family: var(--font-display);
  font-size: 15px; letter-spacing: 1px;
  cursor: pointer; transition: all 0.15s;
}
.btn:active { transform: scale(0.96); }
.btn-green { background: var(--green); color: #000; }
.btn-red { background: var(--red); color: #fff; }
.btn-yellow { background: var(--yellow); color: #000; }
.btn-gray { background: #1e1e1e; color: var(--muted); border: 1px solid var(--border); }
.btn:disabled { opacity: 0.35; pointer-events: none; }

/* 로그 */
.log-panel {
  background: #0a0a0a;
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  height: 70px;
  overflow-y: auto;
  flex-shrink: 0;
}
.log-line { font-size: 11px; color: #444; font-family: monospace; line-height: 1.6; }
.log-line.highlight { color: #888; }

/* ══════════════════════════════
   RESULT SCREEN
══════════════════════════════ */
#result {
  align-items: center;
  justify-content: center;
  padding: 24px;
  gap: 20px;
  background: var(--bg);
}

.result-decision {
  font-family: var(--font-display);
  font-size: clamp(48px, 15vw, 80px);
  letter-spacing: 4px;
  text-align: center;
  animation: decision-in 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes decision-in {
  from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
  to { transform: scale(1) rotate(0deg); opacity: 1; }
}
.decision-pass { color: var(--green); text-shadow: 0 0 40px rgba(6,214,160,0.5); }
.decision-yellow { color: var(--yellow); text-shadow: 0 0 40px rgba(255,209,102,0.5); }
.decision-out { color: var(--red); text-shadow: 0 0 40px rgba(230,57,70,0.5); }

.result-card {
  width: 100%; max-width: 380px;
  background: var(--surface);
  border-radius: 20px;
  padding: 20px;
  border: 1px solid var(--border);
}
.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
}
.result-row:last-child { border-bottom: none; }
.result-row .label { color: var(--muted); }
.result-ok { color: var(--green); font-weight: 700; }
.result-fail { color: var(--red); font-weight: 700; }

.transcript-box {
  width: 100%; max-width: 380px;
  background: #0f0f0f;
  border-radius: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  font-size: 13px; color: var(--muted);
  text-align: center;
}
.transcript-box .t-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.transcript-box .t-text { font-size: 16px; color: var(--text); font-weight: 700; }
.transcript-box .t-score { font-size: 13px; color: var(--green); margin-top: 4px; }

.btn-next {
  width: 100%; max-width: 380px;
  padding: 18px;
  border: none; border-radius: 16px;
  font-family: var(--font-display);
  font-size: 20px; letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-next:active { transform: scale(0.97); }

/* ── 유틸 ── */
.hidden { display: none !important; }
</style>

</head>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const STATE = {
  sentence: 'I want to be a teacher.',
  yellowCards: 0,
  phase: 'idle', // idle | green | red | judging
  visionActive: false,
  lastPose: null,
  prevPose: null,
  lastFace: null,
  // 판정 스냅샷 (RED LIGHT 시점)
  snap: { moving: false, trianglePose: false, squidFace: false },
  // 음성
  recognition: null,
  transcript: '',
  speechPassed: false,
  accuracy: 0,
  mediaStream: null,
  rafId: null,
  lastVideoTime: -1,
};

// ══════════════════════════════════════════════
// 화면 전환
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopVision();
  stopSpeech();
  if (STATE.mediaStream) {
    STATE.mediaStream.getTracks().forEach(t => t.stop());
    STATE.mediaStream = null;
  }
  STATE.phase = 'idle';
  STATE.yellowCards = 0;
  updateCards();
  showScreen('home');
}

// ══════════════════════════════════════════════
// 문장 선택
// ══════════════════════════════════════════════
function onSentenceSelect() {
  const v = document.getElementById('sentence-select').value;
  const inp = document.getElementById('custom-sentence');
  if (v === 'custom') {
    inp.classList.remove('hidden');
    inp.focus();
  } else {
    inp.classList.add('hidden');
    STATE.sentence = v;
  }
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('custom-sentence').addEventListener('input', function() {
    if (this.value.trim()) STATE.sentence = this.value.trim();
  });
});

// ══════════════════════════════════════════════
// 게임 시작
// ══════════════════════════════════════════════
async function startGame() {
  const sel = document.getElementById('sentence-select').value;
  if (sel === 'custom') {
    const v = document.getElementById('custom-sentence').value.trim();
    if (!v) { alert('문장을 입력해주세요'); return; }
    STATE.sentence = v;
  } else {
    STATE.sentence = sel;
  }

  showScreen('game');
  document.getElementById('current-sentence').textContent = STATE.sentence;
  updateCards();

  // 카메라 시작
  await startCamera();
  addLog('🟢 카메라 준비 완료. GREEN LIGHT 버튼을 눌러 시작!');
}

// ══════════════════════════════════════════════
// 카메라
// ══════════════════════════════════════════════
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    STATE.mediaStream = stream;
    const video = document.getElementById('video');
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    video.play();
    resizeCanvas();
  } catch(e) {
    addLog('❌ 카메라 권한 필요: ' + e.message);
  }
}

function resizeCanvas() {
  const wrap = document.querySelector('.camera-wrap');
  const canvas = document.getElementById('overlay-canvas');
  canvas.width = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight;
}
window.addEventListener('resize', resizeCanvas);

// ══════════════════════════════════════════════
// GREEN LIGHT
// ══════════════════════════════════════════════
function onGreenLight() {
  STATE.phase = 'green';
  STATE.visionActive = true;
  STATE.prevPose = null;
  STATE.transcript = '';
  STATE.speechPassed = false;

  // 신호등 오버레이
  showLight('green');

  // 버튼 상태
  document.getElementById('btn-green').disabled = true;
  document.getElementById('btn-red').disabled = false;

  // Vision 루프 시작
  startVisionLoop();

  // 음성 인식 시작
  startSpeech();

  addLog('🟢 GREEN LIGHT — 말하고 포즈 잡아!');
}

// ══════════════════════════════════════════════
// RED LIGHT (FREEZE)
// ══════════════════════════════════════════════
async function onRedLight() {
  if (STATE.phase !== 'green') return;
  STATE.phase = 'red';

  showLight('red');
  addLog('🔴 RED LIGHT — FREEZE!');

  // 스냅샷 저장
  const pose = STATE.lastPose;
  const face = STATE.lastFace;

  const moving = checkMoving();
  const trianglePose = pose ? checkTriangle(pose) : false;
  const squidFace = face ? checkSquidFace(face) : false;

  STATE.snap = { moving, trianglePose, squidFace };

  // Vision 중지
  stopVision();

  // 음성 결과 대기 (최대 2초)
  await waitForSpeech(2000);

  // 최종 판정
  judge();
}

// ══════════════════════════════════════════════
// VISION LOOP (MediaPipe)
// ══════════════════════════════════════════════
function startVisionLoop() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay-canvas');
  const ctx = canvas.getContext('2d');

  function loop() {
    if (!STATE.visionActive) return;
    STATE.rafId = requestAnimationFrame(loop);

    if (video.readyState < 2) return;
    const now = performance.now();
    if (video.currentTime === STATE.lastVideoTime) return;
    STATE.lastVideoTime = video.currentTime;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!window.MP_LOADED) return;

    try {
      // Pose
      const poseResult = window.poseLandmarker.detectForVideo(video, now);
      if (poseResult.landmarks && poseResult.landmarks[0]) {
        const lm = poseResult.landmarks[0];
        STATE.prevPose = STATE.lastPose;
        STATE.lastPose = extractPose(lm);
        drawPoseDots(ctx, lm, canvas.width, canvas.height);
      }

      // Face
      const faceResult = window.faceLandmarker.detectForVideo(video, now);
      if (faceResult.faceBlendshapes && faceResult.faceBlendshapes[0]) {
        STATE.lastFace = extractFace(faceResult.faceBlendshapes[0]);
      }
    } catch(e) { /* GPU 초기화 중 오류 무시 */ }

    // 배지 실시간 업데이트
    if (STATE.phase === 'green') {
      updateBadges();
    }
  }
  loop();
}

function stopVision() {
  STATE.visionActive = false;
  if (STATE.rafId) cancelAnimationFrame(STATE.rafId);
}

// ══════════════════════════════════════════════
// POSE 추출 (정규화 0~1)
// ══════════════════════════════════════════════
// MediaPipe Pose 랜드마크 인덱스
// 0:nose 11:leftShoulder 12:rightShoulder
// 13:leftElbow 14:rightElbow 15:leftWrist 16:rightWrist
function extractPose(lm) {
  return {
    nose:          { x: lm[0].x,  y: lm[0].y  },
    leftShoulder:  { x: lm[11].x, y: lm[11].y },
    rightShoulder: { x: lm[12].x, y: lm[12].y },
    leftElbow:     { x: lm[13].x, y: lm[13].y },
    rightElbow:    { x: lm[14].x, y: lm[14].y },
    leftWrist:     { x: lm[15].x, y: lm[15].y },
    rightWrist:    { x: lm[16].x, y: lm[16].y },
  };
}

function drawPoseDots(ctx, lm, w, h) {
  const keyPoints = [0,11,12,13,14,15,16];
  ctx.save();
  keyPoints.forEach(i => {
    if (!lm[i] || lm[i].visibility < 0.5) return;
    ctx.beginPath();
    // canvas는 미러된 상태이므로 x를 반전
    ctx.arc((1 - lm[i].x) * w, lm[i].y * h, 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(6,214,160,0.8)';
    ctx.fill();
  });
  // 삼각형 그리기 (포즈 OK일 때)
  const pose = STATE.lastPose;
  if (pose && checkTriangle(pose)) {
    const lw = lm[15], rw = lm[16], nose = lm[0];
    ctx.beginPath();
    ctx.moveTo((1-lw.x)*w, lw.y*h);
    ctx.lineTo((1-rw.x)*w, rw.y*h);
    ctx.lineTo((1-nose.x)*w, nose.y*h);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,209,102,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.restore();
}

// ══════════════════════════════════════════════
// FACE 추출 (blendshapes)
// ══════════════════════════════════════════════
function extractFace(blendshapes) {
  const get = (name) => {
    const cat = blendshapes.categories.find(c => c.categoryName === name);
    return cat ? cat.score : 0;
  };
  const jawOpen    = get('jawOpen');
  const mouthSmile = (get('mouthSmileLeft') + get('mouthSmileRight')) / 2;
  const browDown   = (get('browDownLeft') + get('browDownRight')) / 2;
  const eyeSquint  = (get('eyeSquintLeft') + get('eyeSquintRight')) / 2;
  const mouthFrown = (get('mouthFrownLeft') + get('mouthFrownRight')) / 2;
  const cheekPuff  = (get('cheekPuff') || 0);

  // 과장 표정 지수 = 여러 blendshape 합산
  const expressionScore = Math.min(1,
    browDown * 0.3 + eyeSquint * 0.2 + mouthFrown * 0.2 + cheekPuff * 0.3
  );

  return {
    mouthOpenScore: jawOpen,
    expressionScore,
    isFunnyFace: jawOpen > 0.35 || expressionScore > 0.5,
  };
}

// ══════════════════════════════════════════════
// 판정 로직
// ══════════════════════════════════════════════
function checkMoving() {
  if (!STATE.prevPose || !STATE.lastPose) return false;
  const p = STATE.prevPose, c = STATE.lastPose;
  const d = (a, b) => Math.hypot(a.x-b.x, a.y-b.y);
  const total = (
    d(p.nose, c.nose) +
    d(p.leftShoulder, c.leftShoulder) +
    d(p.rightShoulder, c.rightShoulder) +
    d(p.leftWrist, c.leftWrist) +
    d(p.rightWrist, c.rightWrist)
  ) / 5;
  return total > 0.025;
}

function checkTriangle(pose) {
  const { leftWrist: lw, rightWrist: rw, nose, leftShoulder: ls, rightShoulder: rs } = pose;
  const shoulderW = Math.abs(rs.x - ls.x);
  const shoulderCX = (ls.x + rs.x) / 2;

  const handsAboveHead   = lw.y < nose.y - 0.05 && rw.y < nose.y - 0.05;
  const notTooFar        = Math.abs(lw.x - rw.x) < shoulderW * 1.5;
  const nearCenter       = Math.abs((lw.x + rw.x) / 2 - shoulderCX) < shoulderW;
  const sameHeight       = Math.abs(lw.y - rw.y) < 0.1;
  const aboveShoulders   = Math.min(lw.y, rw.y) < Math.min(ls.y, rs.y);

  return handsAboveHead && notTooFar && nearCenter && sameHeight && aboveShoulders;
}

function checkSquidFace(face) {
  return face.mouthOpenScore > 0.35 || face.expressionScore > 0.5;
}

// ══════════════════════════════════════════════
// 배지 업데이트
// ══════════════════════════════════════════════
function updateBadges() {
  const pose = STATE.lastPose;
  const face = STATE.lastFace;

  const moving = pose && STATE.prevPose ? checkMoving() : false;
  const tri    = pose ? checkTriangle(pose) : false;
  const funny  = face ? checkSquidFace(face) : false;
  const rec    = STATE.phase === 'green';

  setBadge('badge-move',  moving, moving ? 'on-red' : 'off');
  setBadge('badge-tri',   tri,    tri    ? 'on-green' : 'off');
  setBadge('badge-face',  funny,  funny  ? 'on-green' : 'off');
  setBadge('badge-voice', rec,    rec    ? 'on-yellow' : 'off');
}

function setBadge(id, active, cls) {
  const el = document.getElementById(id);
  el.className = 'badge ' + cls;
}

// ══════════════════════════════════════════════
// SPEECH (Web Speech API)
// ══════════════════════════════════════════════
function startSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    addLog('⚠️ 이 브라우저는 음성인식 미지원 (Chrome 권장)');
    STATE.speechPassed = false;
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = 'en-US';
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 3;

  rec.onresult = (e) => {
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final += e.results[i][0].transcript + ' ';
      }
    }
    if (final.trim()) {
      STATE.transcript = final.trim();
      STATE.accuracy = calcAccuracy(STATE.sentence, STATE.transcript);
      STATE.speechPassed = STATE.accuracy >= 65;
      addLog(`🎤 "${STATE.transcript}" (${STATE.accuracy}%)`);
    }
  };

  rec.onerror = (e) => {
    if (e.error !== 'aborted') addLog('⚠️ 음성오류: ' + e.error);
  };

  try {
    rec.start();
    STATE.recognition = rec;
  } catch(e) {}
}

function stopSpeech() {
  if (STATE.recognition) {
    try { STATE.recognition.stop(); } catch(e) {}
    STATE.recognition = null;
  }
}

function waitForSpeech(ms) {
  return new Promise(resolve => {
    stopSpeech();
    setTimeout(resolve, ms);
  });
}

// 레벤슈타인 기반 정확도
function calcAccuracy(target, spoken) {
  if (!spoken) return 0;
  const tw = target.toLowerCase().replace(/[^a-z ]/g,'').split(' ').filter(Boolean);
  const sw = spoken.toLowerCase().replace(/[^a-z ]/g,'').split(' ').filter(Boolean);
  let matched = 0;
  const swCopy = [...sw];
  for (const t of tw) {
    const idx = swCopy.findIndex(s => levenshtein(t, s) <= Math.floor(t.length * 0.35));
    if (idx !== -1) { matched++; swCopy.splice(idx, 1); }
  }
  return Math.round((matched / tw.length) * 100);
}

function levenshtein(a, b) {
  const dp = Array.from({length: a.length+1}, (_,i) =>
    Array.from({length: b.length+1}, (_,j) => i===0?j:j===0?i:0)
  );
  for (let i=1;i<=a.length;i++)
    for (let j=1;j<=b.length;j++)
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[a.length][b.length];
}

// ══════════════════════════════════════════════
// 최종 판정
// ══════════════════════════════════════════════
function judge() {
  STATE.phase = 'judging';
  document.getElementById('btn-red').disabled = true;
  document.getElementById('btn-green').disabled = true;

  const { moving, trianglePose, squidFace } = STATE.snap;
  const poseOk = trianglePose || squidFace;
  const passed = !moving && poseOk && STATE.speechPassed;

  let decision;
  if (passed) {
    decision = 'PASS';
  } else {
    const next = STATE.yellowCards + 1;
    decision = next >= 2 ? 'OUT' : 'YELLOW';
    if (decision === 'YELLOW') STATE.yellowCards++;
    if (decision === 'OUT')    STATE.yellowCards = 2;
  }

  updateCards();
  addLog(decision === 'PASS' ? '✅ PASS!' : decision === 'YELLOW' ? '🟡 YELLOW CARD' : '💀 OUT!');

  // 잠깐 딜레이 후 결과 화면
  setTimeout(() => showResult(decision, moving, trianglePose, squidFace), 800);
}

// ══════════════════════════════════════════════
// 결과 화면
// ══════════════════════════════════════════════
function showResult(decision, moving, trianglePose, squidFace) {
  showScreen('result');

  const decEl = document.getElementById('result-decision');
  decEl.textContent = decision === 'PASS' ? '✅ PASS' : decision === 'YELLOW' ? '🟡 YELLOW' : '💀 OUT';
  decEl.className = 'result-decision ' +
    (decision==='PASS'?'decision-pass':decision==='YELLOW'?'decision-yellow':'decision-out');

  setResultRow('r-move',  !moving,           '움직임 없음');
  setResultRow('r-tri',   trianglePose,      '세모 포즈');
  setResultRow('r-face',  squidFace,         '오징어 표정');
  setResultRow('r-voice', STATE.speechPassed,'음성 채점');

  // 음성 결과
  const tText = document.getElementById('t-text');
  const tScore = document.getElementById('t-score');
  tText.textContent = STATE.transcript || '(음성 없음)';
  tScore.textContent = STATE.accuracy ? `정확도 ${STATE.accuracy}%` : '';

  // 다음 버튼
  const btn = document.getElementById('btn-next');
  if (decision === 'OUT') {
    btn.textContent = '🔄 처음부터';
    btn.style.background = 'var(--red)';
    btn.style.color = '#fff';
  } else if (decision === 'PASS') {
    btn.textContent = '다음 라운드 →';
    btn.style.background = 'var(--green)';
    btn.style.color = '#000';
  } else {
    btn.textContent = '다시 도전 →';
    btn.style.background = 'var(--yellow)';
    btn.style.color = '#000';
  }
}

function setResultRow(id, ok, label) {
  const el = document.getElementById(id);
  el.textContent = ok ? '✓ OK' : '✗ FAIL';
  el.className = ok ? 'result-ok' : 'result-fail';
}

function nextRound() {
  const decision = document.getElementById('result-decision').textContent;
  if (decision.includes('OUT')) {
    STATE.yellowCards = 0;
    updateCards();
    goHome();
    return;
  }
  // 게임 화면으로 돌아가서 리셋
  showScreen('game');
  STATE.phase = 'idle';
  STATE.lastPose = null;
  STATE.prevPose = null;
  STATE.lastFace = null;
  STATE.transcript = '';
  STATE.speechPassed = false;

  document.getElementById('btn-green').disabled = false;
  document.getElementById('btn-red').disabled = true;

  // 빛 오버레이 숨기기
  showLight(null);

  // 배지 초기화
  ['badge-move','badge-tri','badge-face','badge-voice']
    .forEach(id => document.getElementById(id).className = 'badge off');

  addLog('➡️ 다음 라운드. GREEN LIGHT 버튼을 눌러!');
}

// ══════════════════════════════════════════════
// UI 헬퍼
// ══════════════════════════════════════════════
function showLight(type) {
  document.getElementById('light-green').classList.remove('show');
  document.getElementById('light-red').classList.remove('show');
  if (type === 'green') document.getElementById('light-green').classList.add('show');
  if (type === 'red')   document.getElementById('light-red').classList.add('show');
  if (type) setTimeout(() => showLight(null), 1500);
}

function updateCards() {
  [0,1].forEach(i => {
    const el = document.getElementById('card'+i);
    el.classList.toggle('active', i < STATE.yellowCards);
  });
  document.getElementById('card-label').textContent = STATE.yellowCards + '/2';
}

function addLog(msg) {
  const panel = document.getElementById('log-panel');
  const line = document.createElement('div');
  line.className = 'log-line highlight';
  line.textContent = msg;
  panel.insertBefore(line, panel.firstChild);
  // 오래된 로그 흐리게
  [...panel.children].slice(1).forEach(el => el.className = 'log-line');
}
</script>
